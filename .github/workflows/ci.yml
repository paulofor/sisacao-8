name: CI

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'mcp-server/**'
      - '.github/workflows/deploy-mcp-vps.yml'
  pull_request:
    paths-ignore:
      - 'mcp-server/**'
      - '.github/workflows/deploy-mcp-vps.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Lint & Test
        run: |
          pip install pytest flake8
          flake8 .
          pytest
