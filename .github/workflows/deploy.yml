name: Deploy

on:
  push:
    branches: [ main ]
    paths:
      - 'functions/**'
      - '.github/workflows/deploy.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'functions/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

env:
  PROJECT_ID: ingestaokraken
  REGION: us-east1

jobs:
  deploy-cloud-functions:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - name: get_stock_data
            entry_point: get_stock_data
            source: functions/get_stock_data
            service_account: sa-get-stock-data@ingestaokraken.iam.gserviceaccount.com
            memory: 512Mi
            env: BQ_INTRADAY_DATASET=cotacao_intraday,BQ_DAILY_TABLE=cotacao_ohlcv_diario,BQ_HOLIDAYS_TABLE=feriados_b3
          - name: intraday_candles
            entry_point: generate_intraday_candles
            source: functions/intraday_candles
            service_account: sa-intraday-candles@ingestaokraken.iam.gserviceaccount.com
            memory: 512Mi
            env: BQ_INTRADAY_DATASET=cotacao_intraday,BQ_INTRADAY_RAW_TABLE=cotacao_b3,BQ_INTRADAY_15M_TABLE=candles_intraday_15m,BQ_INTRADAY_1H_TABLE=candles_intraday_1h
          - name: eod_signals
            entry_point: generate_eod_signals
            source: functions/eod_signals
            service_account: sa-eod-signals@ingestaokraken.iam.gserviceaccount.com
            env: BQ_INTRADAY_DATASET=cotacao_intraday,BQ_DAILY_TABLE=cotacao_ohlcv_diario,BQ_SIGNALS_TABLE=sinais_eod,BQ_HOLIDAYS_TABLE=feriados_b3,BQ_BACKTEST_METRICS_TABLE=backtest_metrics
          - name: backtest_daily
            entry_point: backtest_daily
            source: functions/backtest_daily
            service_account: sa-backtest-daily@ingestaokraken.iam.gserviceaccount.com
            memory: 512Mi
            env: BQ_INTRADAY_DATASET=cotacao_intraday,BQ_DAILY_TABLE=cotacao_ohlcv_diario,BQ_SIGNALS_TABLE=sinais_eod,BQ_BACKTEST_TRADES_TABLE=backtest_trades,BQ_BACKTEST_METRICS_TABLE=backtest_metrics,BQ_HOLIDAYS_TABLE=feriados_b3
          - name: alerts
            entry_point: alerts
            source: functions/alerts
            service_account: sa-alerts@ingestaokraken.iam.gserviceaccount.com
            env: BQ_INTRADAY_DATASET=cotacao_intraday,BQ_SIGNALS_TABLE=sinais_eod
          - name: dq_checks
            entry_point: dq_checks
            source: functions/dq_checks
            service_account: sa-dq-checks@ingestaokraken.iam.gserviceaccount.com
            env: BQ_INTRADAY_DATASET=cotacao_intraday,BQ_DAILY_TABLE=cotacao_ohlcv_diario,BQ_INTRADAY_RAW_TABLE=cotacao_b3,BQ_SIGNALS_TABLE=sinais_eod,BQ_BACKTEST_METRICS_TABLE=backtest_metrics,BQ_HOLIDAYS_TABLE=feriados_b3,BQ_DQ_CHECKS_TABLE=dq_checks_daily,BQ_DQ_INCIDENTS_TABLE=dq_incidents,BQ_TICKERS_TABLE=acao_bovespa
          - name: quant_daily_evaluation
            entry_point: quant_daily_evaluation
            source: functions/quant_daily_evaluation
            service_account: sa-quant-daily-evaluation@ingestaokraken.iam.gserviceaccount.com
            memory: 512Mi
            env: BQ_INTRADAY_DATASET=cotacao_intraday,BQ_QUANT_EVALUATION_TABLE=quant_daily_model_evaluation,BQ_QUANT_RANKING_PERFORMANCE_VIEW=vw_quant_phase3_ranking_performance,BQ_QUANT_ROBUSTNESS_VIEW=vw_quant_phase5_robustness_dashboard,BQ_QUANT_PAPER_TRADING_VIEW=vw_quant_phase6_paper_trading_dashboard
          - name: neural_training_dataset
            entry_point: neural_training_dataset
            source: functions/neural_training_dataset
            service_account: sa-neural-training-dataset@ingestaokraken.iam.gserviceaccount.com
            memory: 1Gi
            timeout: 1800s
            env: BQ_INTRADAY_DATASET=cotacao_intraday,BQ_DAILY_TABLE=cotacao_ohlcv_diario,BQ_HOLIDAYS_TABLE=feriados_b3,BQ_NEURAL_TRAINING_DATASET_TABLE=neural_eod_training_dataset,BQ_LOCATION=us-east1
          - name: neural_training
            entry_point: neural_training
            source: functions/neural_training
            service_account: sa-neural-training@ingestaokraken.iam.gserviceaccount.com
            memory: 2Gi
            timeout: 3600s
            env: BQ_INTRADAY_DATASET=cotacao_intraday,BQ_NEURAL_TRAINING_DATASET_TABLE=neural_eod_training_dataset,BQ_NEURAL_MODEL_REGISTRY_TABLE=neural_model_registry,BQ_LOCATION=us-east1,NEURAL_MODEL_ARTIFACT_BUCKET=sisacao8-neural-artifacts,NEURAL_MODEL_ARTIFACT_PREFIX=neural-eod-models
          - name: neural_evolution_orchestrator
            entry_point: neural_evolution_orchestrator
            source: functions/neural_evolution_orchestrator
            service_account: sa-neural-evolution-orchestrator@ingestaokraken.iam.gserviceaccount.com
            memory: 512Mi
            timeout: 3600s
            env: BQ_INTRADAY_DATASET=cotacao_intraday,BQ_NEURAL_TRAINING_DATASET_TABLE=neural_eod_training_dataset,BQ_NEURAL_MODEL_REGISTRY_TABLE=neural_model_registry,BQ_NEURAL_EVOLUTION_RUNS_TABLE=neural_evolution_runs,BQ_NEURAL_CANDIDATE_CONFIGS_TABLE=neural_candidate_configs,BQ_NEURAL_CANDIDATE_EVALUATIONS_TABLE=neural_candidate_evaluations,BQ_LOCATION=us-east1,NEURAL_TRAINING_URL=https://us-east1-ingestaokraken.cloudfunctions.net/neural_training,NEURAL_EVOLUTION_MAX_TRIALS=10
          - name: neural_champion_approval
            entry_point: neural_champion_approval
            source: functions/neural_champion_approval
            service_account: sa-neural-evolution-orchestrator@ingestaokraken.iam.gserviceaccount.com
            memory: 512Mi
            timeout: 600s
            env: BQ_INTRADAY_DATASET=cotacao_intraday,BQ_NEURAL_MODEL_REGISTRY_TABLE=neural_model_registry,BQ_NEURAL_GATE_DECISIONS_TABLE=neural_gate_decisions,BQ_LOCATION=us-east1
          - name: neural_eod_predictions
            entry_point: neural_eod_predictions
            source: functions/neural_eod_predictions
            service_account: sa-neural-evolution-orchestrator@ingestaokraken.iam.gserviceaccount.com
            memory: 2Gi
            timeout: 1800s
            env: BQ_INTRADAY_DATASET=cotacao_intraday,BQ_DAILY_TABLE=cotacao_ohlcv_diario,BQ_NEURAL_EOD_PREDICTIONS_TABLE=neural_eod_predictions,BQ_NEURAL_MODEL_REGISTRY_TABLE=neural_model_registry,BQ_HOLIDAYS_TABLE=feriados_b3,BQ_LOCATION=us-east1,NEURAL_MODEL_STATUSES=approved
    steps:
      - uses: actions/checkout@v4
      - name: Auth GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'
          project_id: '${{ env.PROJECT_ID }}'
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      - name: Deploy ${{ matrix.name }}
        run: |
          set -o pipefail

          resolve_service_account_arg() {
            local desired_service_account="$1"

            if gcloud iam service-accounts describe "${desired_service_account}" \
              --project "${PROJECT_ID}" >/dev/null 2>&1; then
              echo "Using configured service account ${desired_service_account}." >&2
              printf -- '--service-account=%s' "${desired_service_account}"
              return 0
            fi

            echo "Configured service account ${desired_service_account} was not found." >&2
            echo "Deploy will proceed without --service-account and keep existing/default identity." >&2
            return 0
          }

          get_function_state() {
            gcloud functions describe "$1" \
              --project "${PROJECT_ID}" \
              --region "${REGION}" \
              --gen2 \
              --format='value(state)' 2>/dev/null || true
          }

          wait_for_idle_function() {
            local function_name="$1"
            local max_checks=40
            local sleep_seconds=15

            for check in $(seq 1 "${max_checks}"); do
              state=$(get_function_state "${function_name}")

              if [ -z "${state}" ] || [ "${state}" = "ACTIVE" ] || [ "${state}" = "FAILED" ]; then
                echo "Function ${function_name} is in state '${state:-UNKNOWN}'. Continuing deploy."
                return 0
              fi

              if [ "${state}" = "DEPLOYING" ]; then
                waited_seconds=$((check * sleep_seconds))
                echo "Function ${function_name} is DEPLOYING (${check}/${max_checks}). Waiting ${sleep_seconds}s (${waited_seconds}s elapsed)..."
                sleep "${sleep_seconds}"
                continue
              fi

              echo "Function ${function_name} is in state '${state}'. Continuing deploy without extra wait."
              return 0
            done

            echo "Timed out waiting for ${function_name} to leave DEPLOYING state."
            return 1
          }

          wait_for_idle_function "${{ matrix.name }}"

          source_dir="${{ matrix.source }}"
          echo "Preparing source package from ${source_dir}"
          if [ ! -d "${source_dir}" ]; then
            echo "Source directory ${source_dir} does not exist." >&2
            exit 1
          fi

          if [ "${{ matrix.name }}" = "neural_eod_predictions" ]; then
            echo "Vendoring minimal sisacao8 inference package into ${source_dir}."
            rm -rf "${source_dir}/sisacao8"
            mkdir -p "${source_dir}/sisacao8"
            printf '"""Vendored minimal sisacao8 package for neural_eod_predictions."""\n' > "${source_dir}/sisacao8/__init__.py"
            cp sisacao8/neural_inference.py "${source_dir}/sisacao8/neural_inference.py"
            cp sisacao8/neural_dataset.py "${source_dir}/sisacao8/neural_dataset.py"
            cp sisacao8/neural_training.py "${source_dir}/sisacao8/neural_training.py"
            cp sisacao8/neural_muen.py "${source_dir}/sisacao8/neural_muen.py"
            cp sisacao8/trade_engine.py "${source_dir}/sisacao8/trade_engine.py"
          fi

          source_fingerprint=$(find "${source_dir}" -type f -print0 \
            | sort -z \
            | xargs -0 sha256sum \
            | sha256sum \
            | cut -d ' ' -f 1)
          echo "Source fingerprint for ${{ matrix.name }}: ${source_fingerprint}"

          if [ "${{ matrix.name }}" = "neural_training" ]; then
            vendored_training="${source_dir}/sisacao8/neural_training.py"
            if [ ! -f "${vendored_training}" ]; then
              echo "Missing vendored neural training helper: ${vendored_training}" >&2
              exit 1
            fi
            if ! grep -q "align_config_to_dataset" "${vendored_training}"; then
              echo "Vendored neural_training.py does not contain align_config_to_dataset; refusing stale deploy." >&2
              exit 1
            fi
            echo "Vendored neural_training.py fingerprint: $(sha256sum "${vendored_training}")"
            nl -ba "${vendored_training}" | sed -n '180,260p'
          fi

          service_account_arg=$(resolve_service_account_arg "${{ matrix.service_account }}")

          deploy_cmd=(
            gcloud functions deploy "${{ matrix.name }}"
            --runtime python311
            --trigger-http
            --allow-unauthenticated
            --entry-point "${{ matrix.entry_point }}"
            --source "${source_dir}"
            --project "${PROJECT_ID}"
            --region "${REGION}"
            --set-env-vars="${{ matrix.env }},DEPLOY_SOURCE_FINGERPRINT=${source_fingerprint},DEPLOY_GITHUB_SHA=${GITHUB_SHA}"
            --quiet
          )

          if [ -n "${service_account_arg}" ]; then
            deploy_cmd+=("${service_account_arg}")
          fi

          if [ -n "${{ matrix.memory }}" ]; then
            deploy_cmd+=("--memory=${{ matrix.memory }}")
          fi

          if [ -n "${{ matrix.timeout }}" ]; then
            deploy_cmd+=("--timeout=${{ matrix.timeout }}")
          fi

          for attempt in 1 2 3; do
            log_file=$(mktemp)

            set +e
            "${deploy_cmd[@]}" --verbosity=debug --log-http 2>&1 | tee "$log_file"
            status=${PIPESTATUS[0]}
            set -e

            if [ $status -eq 0 ]; then
              rm -f "$log_file"
              break
            fi

            if grep -q "unable to queue the operation" "$log_file" && [ $attempt -lt 3 ]; then
              echo "Deploy returned 409 queue conflict. Waiting until function is no longer DEPLOYING (attempt ${attempt}/3)."
              rm -f "$log_file"

              if ! wait_for_idle_function "${{ matrix.name }}"; then
                echo "Function remained DEPLOYING for too long after queue conflict."
                exit 1
              fi

              continue
            fi

            echo "Deploy command failed with status $status. Last 200 lines of gcloud output:"
            tail -n 200 "$log_file"
            rm -f "$log_file"

            echo "Collecting additional diagnostics for ${{ matrix.name }}..."
            gcloud functions describe "${{ matrix.name }}" \
              --project "${PROJECT_ID}" \
              --region "${REGION}" \
              --gen2 \
              --format=yaml || true

            gcloud run revisions list \
              --project "${PROJECT_ID}" \
              --region "${REGION}" \
              --service "${{ matrix.name }}" \
              --limit=5 || true

            gcloud logging read \
              'resource.type="cloud_run_revision" AND resource.labels.service_name="${{ matrix.name }}"' \
              --project "${PROJECT_ID}" \
              --limit=100 \
              --format="value(timestamp,severity,textPayload,jsonPayload.message)" || true

            exit $status
          done

  deploy-cloud-run:
    runs-on: ubuntu-latest
    needs: deploy-cloud-functions
    steps:
      - uses: actions/checkout@v4
      - name: Auth GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'
          project_id: '${{ env.PROJECT_ID }}'
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      - name: Deploy google_finance_price
        run: |
          configured_service_account="sa-google-finance-price@${PROJECT_ID}.iam.gserviceaccount.com"
          service_account_arg=""

          if gcloud iam service-accounts describe "${configured_service_account}" \
            --project "${PROJECT_ID}" >/dev/null 2>&1; then
            echo "Using configured service account ${configured_service_account}."
            service_account_arg="--service-account=${configured_service_account}"
          else
            echo "Configured service account ${configured_service_account} was not found."
            echo "Deploy will proceed without --service-account and keep existing/default identity."
          fi

          deploy_cmd=(
            gcloud run deploy google-finance-price
            --source functions/google_finance_price
            --project "${PROJECT_ID}"
            --region "${REGION}"
            --allow-unauthenticated
            --set-env-vars=FUNCTION_TARGET=google_finance_price,FUNCTION_SIGNATURE_TYPE=http,BQ_INTRADAY_DATASET=cotacao_intraday,BQ_INTRADAY_RAW_TABLE=cotacao_b3,BQ_HOLIDAYS_TABLE=feriados_b3
            --quiet
          )

          if [ -n "${service_account_arg}" ]; then
            deploy_cmd+=("${service_account_arg}")
          fi

          "${deploy_cmd[@]}"
