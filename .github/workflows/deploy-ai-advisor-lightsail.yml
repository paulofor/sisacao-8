name: Deploy AI Advisor Gemini module to Lightsail

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'backend/sisacao-backend/src/main/java/com/sisacao/backend/aiadvisor/**'
      - 'backend/sisacao-backend/src/main/resources/application.properties'
      - '.github/workflows/deploy-ai-advisor-lightsail.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build backend with AI advisor module
        working-directory: backend/sisacao-backend
        run: ./mvnw clean package -DskipTests

      - name: Upload backend artifact to Lightsail
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 34.194.252.70
          username: deploy
          key: ${{ secrets.KEY }}
          port: 22
          source: backend/sisacao-backend/target/sisacao-backend-0.0.1-SNAPSHOT.jar
          target: /home/deploy/sisacao/app/
          overwrite: true
          strip_components: 3
          timeout: 120s

      - name: Enable Gemini advisor and restart backend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 34.194.252.70
          username: deploy
          key: ${{ secrets.KEY }}
          port: 22
          script: |
            set -euo pipefail

            GEMINI_SOURCE_KEY_FILE=/home/ubuntu/keys/gemini_api_key
            GEMINI_RUNTIME_KEY_FILE=/opt/sisacao/app/secrets/gemini_api_key
            if ! sudo test -r "${GEMINI_SOURCE_KEY_FILE}"; then
              echo "Gemini API key file not readable: ${GEMINI_SOURCE_KEY_FILE}" >&2
              exit 1
            fi

            sudo install -d /opt/sisacao/app/
            sudo install -d -m 750 /opt/sisacao/app/secrets
            sudo install -m 640 "${GEMINI_SOURCE_KEY_FILE}" "${GEMINI_RUNTIME_KEY_FILE}"
            if getent group sisacao >/dev/null; then
              sudo chgrp sisacao "${GEMINI_RUNTIME_KEY_FILE}" /opt/sisacao/app/secrets
            fi
            sudo mv /home/deploy/sisacao/app/sisacao-backend-0.0.1-SNAPSHOT.jar /opt/sisacao/app/sisacao-backend.jar
            sudo touch /opt/sisacao/app/.env
            sudo sed -i '/^AI_ADVISOR_ENABLED=/d;/^AI_ADVISOR_PROVIDER=/d;/^GEMINI_API_KEY_FILE=/d;/^GEMINI_MODEL=/d' /opt/sisacao/app/.env
            {
              echo 'AI_ADVISOR_ENABLED=true'
              echo 'AI_ADVISOR_PROVIDER=gemini'
              echo "GEMINI_API_KEY_FILE=${GEMINI_RUNTIME_KEY_FILE}"
              echo 'GEMINI_MODEL=gemini-1.5-flash'
            } | sudo tee -a /opt/sisacao/app/.env >/dev/null
            sudo chown root:root /opt/sisacao/app/.env
            sudo chmod 644 /opt/sisacao/app/.env
            sudo systemctl daemon-reload

            if ! sudo systemctl restart sisacao-backend.service; then
              echo "==== Últimos logs do serviço ===="
              sudo journalctl -u sisacao-backend.service -n 200 --no-pager
              exit 1
            fi

            sudo systemctl status sisacao-backend.service --no-pager || true
          timeout: 60s
          command_timeout: 30m
