name: Deploy MCP Server to VPS

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'mcp-server/**'
      - '.github/workflows/deploy-mcp-vps.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/mcp-server
  VPS_HOST: 187.45.254.75
  VPS_PORT: '22'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: mcp-server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Deploy container on VPS
        uses: appleboy/ssh-action@v1.0.3
        env:
          MCP_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          GHCR_USER: ${{ secrets.GHCR_USERNAME != '' && secrets.GHCR_USERNAME || github.repository_owner }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN != '' && secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ secrets.VPS_SSH_USER }}
          key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
          port: ${{ env.VPS_PORT }}
          envs: MCP_IMAGE,GHCR_USER,GHCR_TOKEN
          script: |
            set -euo pipefail

            echo "[deploy] usando imagem ${MCP_IMAGE}"
            if [ -z "${GHCR_USER}" ] || [ -z "${GHCR_TOKEN}" ]; then
              echo "[deploy] GHCR_USER/GHCR_TOKEN não configurados para login no GHCR" >&2
              exit 1
            fi

            echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_USER}" --password-stdin

            docker pull "${MCP_IMAGE}"
            docker rm -f sisacao8-mcp-server || true

            docker run -d \
              --name sisacao8-mcp-server \
              --restart unless-stopped \
              -e GCP_PROJECT="${{ secrets.GCP_PROJECT }}" \
              -e GCP_REGION="${{ secrets.GCP_REGION }}" \
              "${MCP_IMAGE}"
